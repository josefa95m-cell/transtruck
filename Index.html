<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trans Truck S.R.L. — Panel de Gestión</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#0f1e30;color:#222;font-size:14px}
.topbar{background:#0f1e30;border-bottom:3px solid #E8521A;padding:10px 22px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.topbar-logo{height:54px;width:auto;cursor:pointer}
.topbar-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px}
.topbar-sub{font-size:11px;color:#aab8c8}
.nav-tabs{display:flex;gap:5px;flex-wrap:wrap}
.nav-tab{padding:7px 18px;border:none;border-radius:7px;cursor:pointer;font-size:12px;font-weight:700;background:rgba(255,255,255,.1);color:#aab8c8;transition:all .15s}
.nav-tab:hover{background:rgba(232,82,26,.2);color:#E8521A}
.nav-tab.active{background:#E8521A;color:#fff}
.filterbar{background:#152638;border-bottom:1px solid #1e3a55;padding:9px 22px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.mes-sel{padding:5px 12px;border:1px solid #2a4a6a;border-radius:7px;font-size:12px;font-weight:600;background:#0f1e30;color:#fff}
.filter-label{font-size:12px;color:#aab8c8}
.content-wrap{background:#f2f2ee;min-height:calc(100vh - 110px)}
.section{display:none;padding:18px 22px}
.section.active{display:block}
.sec-title{font-size:15px;font-weight:700;margin-bottom:14px;color:#0f1e30;border-left:4px solid #E8521A;padding-left:10px}
.sec-title.green{border-color:#16a34a;color:#166534}
.sec-title.amber{border-color:#E8521A;color:#92400e}
.mgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(135px,1fr));gap:9px;margin-bottom:18px}
.mc{background:#fff;border-radius:9px;padding:13px 15px;border:1px solid #e5e5dc;border-top:3px solid #E8521A}
.mc.blue{border-top-color:#1a3d6e}
.mc.green{border-top-color:#16a34a}
.mc-label{font-size:10px;color:#999;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.mc-val{font-size:21px;font-weight:700;color:#0f1e30}
.mc-val.orange{color:#E8521A}
.mc-val.green{color:#16a34a}
.mc-val.red{color:#dc2626}
.mc-sub{font-size:10px;color:#bbb;margin-top:2px}
.crow{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:18px}
.card{background:#fff;border-radius:9px;padding:15px;border:1px solid #e5e5dc}
.card-title{font-size:11px;font-weight:700;color:#E8521A;text-transform:uppercase;letter-spacing:.04em;margin-bottom:11px;border-bottom:1px solid #f0f0e8;padding-bottom:6px}
.twrap{overflow-x:auto;margin-top:4px}
table{width:100%;border-collapse:collapse;font-size:11px}
th{text-align:right;padding:7px 9px;background:#f7f7f2;color:#666;font-weight:700;font-size:10px;border-bottom:2px solid #E8521A;white-space:nowrap}
th:first-child{text-align:left}
td{text-align:right;padding:7px 9px;border-bottom:1px solid #f2f2ec;color:#333;white-space:nowrap}
td:first-child{text-align:left;font-weight:600;color:#0f1e30}
tr.tot td{background:#0f1e30;color:#fff;font-weight:700;border-top:2px solid #E8521A}
tr.tot td:first-child{color:#E8521A}
tr:hover:not(.tot) td{background:#fff8f5}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700}
.bg{background:#dcfce7;color:#166534}
.ba{background:#fff3e0;color:#e65100}
.br{background:#fee2e2;color:#991b1b}
.prow{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.plabel{width:150px;font-size:11px;color:#444;flex-shrink:0}
.pbg{flex:1;height:10px;background:#f0f0e8;border-radius:5px;overflow:hidden}
.pfill{height:100%;border-radius:5px}
.pval{width:62px;text-align:right;font-size:11px;font-weight:700;color:#333}
.leg{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:9px;font-size:11px;color:#666}
.leg span{display:flex;align-items:center;gap:4px}
.ld{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.tag{display:inline-block;padding:1px 7px;border-radius:8px;font-size:10px;font-weight:600;background:#fff3e0;color:#e65100}

/* PANEL DE CARGA */
.overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);z-index:1000;align-items:center;justify-content:center}
.overlay.show{display:flex}
.upload-panel{background:#fff;border-radius:14px;padding:28px;width:90%;max-width:480px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.upload-panel h2{font-size:16px;font-weight:700;color:#0f1e30;margin-bottom:6px}
.upload-panel p{font-size:12px;color:#888;margin-bottom:20px}
.upload-input-wrap{margin-bottom:14px}
.upload-input-wrap label{display:block;font-size:11px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px}
.upload-input-wrap input[type=file]{width:100%;padding:7px;border:1px dashed #ccc;border-radius:7px;font-size:12px;background:#fafaf8;cursor:pointer}
.upload-input-wrap input[type=file].ok{border-color:#16a34a;background:#f0fdf4}
.upload-btn{width:100%;padding:11px;background:#E8521A;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;margin-top:6px}
.upload-btn:hover{background:#d14510}
.upload-btn:disabled{background:#ccc;cursor:not-allowed}
.upload-close{width:100%;padding:8px;background:transparent;color:#888;border:1px solid #ddd;border-radius:8px;font-size:12px;cursor:pointer;margin-top:8px}
.upload-close:hover{background:#f5f5f5}
.upload-status{font-size:12px;color:#E8521A;margin-top:10px;text-align:center;min-height:18px}
.upload-ok{color:#16a34a}

/* CLAVE */
.clave-panel{background:#fff;border-radius:14px;padding:28px;width:90%;max-width:360px}
.clave-panel h2{font-size:16px;font-weight:700;color:#0f1e30;margin-bottom:16px;text-align:center}
.clave-panel input{width:100%;padding:10px 14px;border:1px solid #ddd;border-radius:8px;font-size:14px;margin-bottom:12px;text-align:center;letter-spacing:.2em}
.clave-panel input:focus{outline:none;border-color:#E8521A}
.clave-error{font-size:12px;color:#dc2626;text-align:center;margin-bottom:8px;min-height:18px}

@media(max-width:620px){.crow{grid-template-columns:1fr}.nav-tab{padding:6px 11px;font-size:11px}}
</style>
</head>
<body>

<!-- OVERLAY CLAVE -->
<div class="overlay" id="overlayKey">
  <div class="clave-panel">
    <h2>Panel de actualización</h2>
    <input type="password" id="claveInput" placeholder="Ingresá la clave" onkeydown="if(event.key==='Enter')verificarClave()">
    <div class="clave-error" id="claveError"></div>
    <button class="upload-btn" onclick="verificarClave()">Ingresar</button>
    <button class="upload-close" onclick="cerrarOverlay()">Cancelar</button>
  </div>
</div>

<!-- OVERLAY CARGA -->
<div class="overlay" id="overlayUpload">
  <div class="upload-panel">
    <h2>Actualizar datos</h2>
    <p>Seleccioná los 4 archivos Excel. Podés cargar solo los que cambiaron — los demás quedan como estaban.</p>
    <div class="upload-input-wrap">
      <label>Reportes (REPORTES.xlsx)</label>
      <input type="file" id="fileRep" accept=".xlsx,.xlsm" onchange="markFile(this)">
    </div>
    <div class="upload-input-wrap">
      <label>Movimientos (Movimientos_MACRO.xlsm)</label>
      <input type="file" id="fileMov" accept=".xlsx,.xlsm" onchange="markFile(this)">
    </div>
    <div class="upload-input-wrap">
      <label>Combustible (COMBUSTIBLE_MACRO.xlsm)</label>
      <input type="file" id="fileComb" accept=".xlsx,.xlsm" onchange="markFile(this)">
    </div>
    <div class="upload-input-wrap">
      <label>Fijo / Mantenimiento (FIJO_MANTENIMIENTO_.xlsx)</label>
      <input type="file" id="fileFijo" accept=".xlsx,.xlsm" onchange="markFile(this)">
    </div>
    <div class="upload-status" id="uploadStatus"></div>
    <button class="upload-btn" id="uploadBtn" onclick="procesarArchivos()">Actualizar panel</button>
    <button class="upload-close" onclick="cerrarOverlay()">Cerrar</button>
  </div>
</div>

function leerExcel(file, sheetName){
  return new Promise((res,rej)=>{
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const wb=XLSX.read(e.target.result,{type:'array',cellDates:true});
        const ws=wb.Sheets[sheetName]||(wb.Sheets[wb.SheetNames[0]]);
        const data=XLSX.utils.sheet_to_json(ws,{defval:''});
        res(data);
      }catch(err){rej(err);}
    };
    reader.onerror=rej;
    reader.readAsArrayBuffer(file);
  });
}

function clean(v){
  if(v===null||v===undefined||v==='') return null;
  if(v instanceof Date) return v.toISOString().substring(0,10);
  return v;
}

function procesarFecha(v){
  if(!v) return null;
  if(v instanceof Date) return v.toISOString().substring(0,10);
  const s=String(v).trim();
  if(s.match(/^\d{4}-\d{2}-\d{2}/)) return s.substring(0,10);
  return s;
}

function fechaAMes(v){
  if(!v) return '';
  const s=String(v).trim();
  if(s.match(/^\d{4}-\d{2}/)) return s.substring(0,7);
  return '';
}

async function procesarArchivos(){
  const btn=document.getElementById('uploadBtn');
  const status=document.getElementById('uploadStatus');
  btn.disabled=true;
  status.textContent='Procesando...';
  status.className='upload-status';

  try{
    const fRep=document.getElementById('fileRep').files[0];
    const fMov=document.getElementById('fileMov').files[0];
    const fComb=document.getElementById('fileComb').files[0];
    const fFijo=document.getElementById('fileFijo').files[0];

    if(fRep){
      status.textContent='Leyendo reportes...';
      const raw=await leerExcel(fRep,'BASE');
      DATOS.rep=raw.map(r=>({
        Camion:r.Camion,Mes:String(r.Mes||'').substring(0,7),
        Km:r.Km,Litros:r.Litros,Viajes:r.Viajes,Kg:r.Kg,
        'Lt/100':r['Lt/100'],'Combustible_$':r.Combustible_$,
        'Mant_$':r.Mant_$,'Fijo_operacion_$':r.Fijo_operacion_$,
        'Costo_Total_$':r.Costo_Total_$,'Facturacion_Bruta_$':r.Facturacion_Bruta_$,
        'Margen_$':r.Margen_$,'%_Margen':r['%_Margen'],
        'Costo_total/km':r['Costo_total/km'],Ingreso_km:r.Ingreso_km,
        Costo_viaje:r.Costo_viaje,Kg_Viaje:r.Kg_Viaje
      }));
    }

    if(fMov){
      status.textContent='Leyendo movimientos...';
      const raw=await leerExcel(fMov,'Movimientos');
      DATOS.mov=raw.map(r=>{
        const fecha=procesarFecha(r['Fecha ']||r.Fecha);
        const mes=fecha?fecha.substring(0,7):'';
        return{
          Fecha_str:fecha,Mes_str:mes,Camion:r.Camion,Chofer:r.Chofer,
          Mercaderia:r.Mercaderia,'Neto ':r['Neto ']||r.Neto,
          'Km asfalto':r['Km asfalto'],'Cuenta corriente':r['Cuenta corriente'],
          'Tipo de movimiento':r['Tipo de movimiento']
        };
      });
    }

    if(fComb){
      status.textContent='Leyendo combustible...';
      const raw=await leerExcel(fComb,'CARGA COMBUSTIBLE');
      DATOS.comb=raw.map(r=>{
        const fecha=procesarFecha(r.Fecha);
        const mes=fecha?fecha.substring(0,7):'';
        return{
          Fecha_str:fecha,Mes_str:mes,Chofer:r.Chofer,LT:r.LT,
          'Costo/lt':r['Costo/lt'],Km:r.Km,Camion:r.Camion,
          'Valor total':r['Valor total'],'Lt/100':r['Lt/100'],'$/100':r['$/100']
        };
      });
    }

    if(fFijo){
      status.textContent='Leyendo costos fijos...';
      const rawF=await leerExcel(fFijo,'Costos Fijos..');
      DATOS.fijos=rawF.filter(r=>String(r.EnUso||'').toLowerCase()==='si').map(r=>({
        Concepto:r.Concepto,Patente:r.Patente,Importe:r.Importe,
        Periodo:String(r.Periodo||'').substring(0,7)
      }));
      const rawM=await leerExcel(fFijo,'Gastos Mantenimiento');
      DATOS.mant=rawM.map(r=>{
        const fecha=procesarFecha(r.Fecha);
        return{
          Fecha_str:fecha,Mes:String(r.Mes||'').substring(0,7),
          Chofer:r.Chofer,Tipo:r.Tipo,Monto:r.Monto,
          Descripcion:r.Descripcion,Patente:r.Patente
        };
      });
    }

    initMeses();
    renderAll();
    const now=new Date();
    document.getElementById('tfecha').textContent=`Actualizado: ${now.toLocaleDateString('es-AR')} ${now.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'})}`;
    status.textContent='Panel actualizado correctamente!';
    status.className='upload-status upload-ok';
    btn.disabled=false;
  }catch(e){
    status.textContent='Error al procesar. Verificá los archivos.';
    btn.disabled=false;
    console.error(e);
  }
}

// ===== MESES =====
function initMeses(){
  const set=new Set();
  DATOS.rep.forEach(r=>{if(r.Mes)set.add(r.Mes);});
  DATOS.mov.forEach(r=>{if(r.Mes_str)set.add(r.Mes_str);});
  const meses=[...set].filter(m=>m&&m.match(/^\d{4}-\d{2}$/)).sort();
  const sel=document.getElementById('mesSelect');
  const cur=sel.value;
  sel.innerHTML=meses.map(m=>`<option value="${m}">${fmtMes(m)}</option>`).join('');
  if(meses.includes(cur))sel.value=cur;
  else if(meses.length)sel.value=meses[meses.length-1];
}

function renderOp(){
  const mes=getMes();
  const mov=DATOS.mov.filter(r=>r.Mes_str===mes);
  const comb=DATOS.comb.filter(r=>r.Mes_str===mes&&n(r.LT)>0);
  const st={};
  CAMIONES.forEach(c=>st[c]={viajes:0,kg:0,km:0,litros:0,lt100s:[],chofer:''});
  mov.forEach(r=>{
    const cam=(r.Camion||''). trim();
    if(!st[cam])return;
    st[cam].viajes++;
    st[cam].kg+=n(r['Neto ']||0);
    st[cam].km+=n(r['Km asfalto']||0);
    if(r.Chofer&&!st[cam].chofer)st[cam].chofer=String(r.Chofer).split(' ')[0];
  });
  comb.forEach(r=>{
    const cam=(r.Camion||''). trim();
    if(!st[cam])return;
    st[cam].litros+=n(r.LT||0);
    const l=n(r['Lt/100']||0);
    if(l>5&&l<200)st[cam].lt100s.push(l);
  });
  const totV=CAMIONES.reduce((a,c)=>a+st[c].viajes,0);
  const totKm=CAMIONES.reduce((a,c)=>a+st[c].km,0);
  const totLt=CAMIONES.reduce((a,c)=>a+st[c].litros,0);
  const mercMap={};
  mov.forEach(r=>{const m=(r.Mercaderia||'Sin dato').trim();if(!mercMap[m])mercMap[m]=0;mercMap[m]+=n(r['Neto ']||0);});
  const mercs=Object.entries(mercMap).sort((a,b)=>b[1]-a[1]);
  const mColors=['#1a3d6e','#E8521A','#2563a8','#c0392b','#7F77DD','#888780'];
  const mercTot=mercs.reduce((a,e)=>a+e[1],0);
  const ultimos=[...mov].sort((a,b)=>(b.Fecha_str||''). localeCompare(a.Fecha_str||'')).slice(0,20);

  document.getElementById('tab-op').innerHTML=`
  <div class="sec-title">Movimiento operativo — ${fmtMes(mes)}</div>
  <div class="mgrid">
    <div class="mc"><div class="mc-label">Viajes del mes</div><div class="mc-val orange">${totV}</div></div>
    <div class="mc blue"><div class="mc-label">Km facturados</div><div class="mc-val">${fmtN(totKm)}</div></div>
    <div class="mc"><div class="mc-label">Litros cargados</div><div class="mc-val orange">${fmtN(totLt)}</div></div>
    <div class="mc blue"><div class="mc-label">Camiones activos</div><div class="mc-val">${CAMIONES.filter(c=>st[c].viajes>0).length}</div></div>
  </div>
  <div class="crow">
    <div class="card">
      <div class="card-title">Viajes por camión</div>
      <div class="leg">${CAMIONES.map(c=>`<span><span class="ld" style="background:${CCOL[c]}"></span>${c}</span>`).join('')}</div>
      <div style="position:relative;height:210px"><canvas id="cViajes" role="img" aria-label="Viajes"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">Consumo Lt/100km por camión</div>
      <div style="position:relative;height:210px"><canvas id="cConsumo" role="img" aria-label="Consumo"></canvas></div>
    </div>
  </div>
  <div class="card" style="margin-bottom:18px">
    <div class="card-title">Mercaderías transportadas — ${fmtMes(mes)}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:center">
      <div style="position:relative;height:200px"><canvas id="cMerc" role="img" aria-label="Mercaderías"></canvas></div>
      <div>${mercs.map((e,i)=>`<div class="prow"><span class="plabel">${e[0]}</span><div class="pbg"><div class="pfill" style="width:${mercTot>0?(e[1]/mercTot*100).toFixed(0):0}%;background:${mColors[i]||'#888'}"></div></div><span class="pval">${fmtN(e[1])} kg</span></div>`).join('')}</div>
    </div>
  </div>
  <div class="card" style="margin-bottom:18px">
    <div class="card-title">Resumen por camión</div>
    <div class="twrap"><table>
      <thead><tr><th>Camión</th><th>Chofer</th><th>Viajes</th><th>Km</th><th>Litros</th><th>Lt/100km</th></tr></thead>
      <tbody>
      ${CAMIONES.map(c=>{const s=st[c];const lt=s.lt100s.length?(s.lt100s.reduce((a,b)=>a+b,0)/s.lt100s.length).toFixed(1):'-';return`<tr><td>${c}</td><td>${s.chofer||'-'}</td><td>${s.viajes}</td><td>${fmtN(s.km)}</td><td>${fmtN(s.litros)}</td><td>${lt}</td></tr>`;}).join('')}
      <tr class="tot"><td>Total</td><td>-</td><td>${totV}</td><td>${fmtN(totKm)}</td><td>${fmtN(totLt)}</td><td>-</td></tr>
      </tbody>
    </table></div>
  </div>
  <div class="card" style="margin-bottom:18px">
    <div class="card-title">Últimos movimientos registrados</div>
    <div class="twrap"><table>
      <thead><tr><th>Fecha</th><th>Camión</th><th>Chofer</th><th>Mercadería</th><th>Kg</th><th>Km</th><th>Cliente</th><th>Tipo</th></tr></thead>
      <tbody>${ultimos.map(r=>`<tr><td>${r.Fecha_str||'-'}</td><td><strong>${r.Camion||'-'}</strong></td><td>${(r.Chofer||''). split(' ')[0]}</td><td>${r.Mercaderia||'-'}</td><td>${fmtN(n(r['Neto ']))}</td><td>${r['Km asfalto']||'-'}</td><td>${(r['Cuenta corriente']||''). trim()||'Directo'}</td><td><span class="tag">${(r['Tipo de movimiento']||''). trim()}</span></td></tr>`).join('')}</tbody>
    </table></div>
  </div>`;

  dChart('cViajes');charts['cViajes']=new Chart(document.getElementById('cViajes'),{type:'bar',data:{labels:CAMIONES,datasets:[{label:'Viajes',data:CAMIONES.map(c=>st[c].viajes),backgroundColor:CAMIONES.map(c=>CCOL[c]),borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false}},y:{ticks:{font:{size:10}},beginAtZero:true}}}});
  dChart('cConsumo');charts['cConsumo']=new Chart(document.getElementById('cConsumo'),{type:'bar',data:{labels:CAMIONES,datasets:[{label:'Lt/100km',data:CAMIONES.map(c=>{const s=st[c];return s.lt100s.length?+(s.lt100s.reduce((a,b)=>a+b,0)/s.lt100s.length).toFixed(1):0;}),backgroundColor:CAMIONES.map(c=>CCOL[c]),borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:10}},beginAtZero:true},y:{ticks:{font:{size:11}},grid:{display:false}}}}});
  dChart('cMerc');if(mercs.length)charts['cMerc']=new Chart(document.getElementById('cMerc'),{type:'doughnut',data:{labels:mercs.map(e=>e[0]),datasets:[{data:mercs.map(e=>Math.round(e[1])),backgroundColor:mColors,borderWidth:2,borderColor:'#fff'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}}}});
}

// ===== COSTOS =====
function renderCos(){
  const mes=getMes();
  const fijos=DATOS.fijos.filter(r=>r.Periodo===mes);
  const mant=DATOS.mant.filter(r=>r.Mes===mes);
  const repMes=DATOS.rep.filter(r=>r.Mes===mes);
  const totFijo=fijos.reduce((a,r)=>a+n(r.Importe),0);
  const mantPorTipo={};
  mant.forEach(r=>{const t=(r.Tipo||'Otros').trim();if(!mantPorTipo[t])mantPorTipo[t]=0;mantPorTipo[t]+=n(r.Monto);});
  const totMant=Object.values(mantPorTipo).reduce((a,b)=>a+b,0);
  const tipoE=Object.entries(mantPorTipo).sort((a,b)=>b[1]-a[1]);
  const tColors=['#E8521A','#1a3d6e','#2563a8','#c0392b','#7F77DD','#888780'];
  const totComb=repMes.reduce((a,r)=>a+n(r.Combustible_$),0);
  const totFijoOp=repMes.reduce((a,r)=>a+n(r.Fijo_operacion_$),0);
  const totTotal=repMes.reduce((a,r)=>a+n(r.Costo_Total_$),0);
  const fijosPorConcepto={};
  fijos.forEach(r=>{const c=(r.Concepto||'Otros').trim();if(!fijosPorConcepto[c])fijosPorConcepto[c]=0;fijosPorConcepto[c]+=n(r.Importe);});
  const conceptoE=Object.entries(fijosPorConcepto).sort((a,b)=>b[1]-a[1]);
  const fijosCam={};CAMIONES.forEach(c=>fijosCam[c]=0);
  fijos.forEach(r=>{const c=(r.Patente||''). trim();if(fijosCam[c]!==undefined)fijosCam[c]+=n(r.Importe);});
  const mantCam={};CAMIONES.forEach(c=>mantCam[c]=0);
  mant.forEach(r=>{const c=(r.Patente||''). trim();if(mantCam[c]!==undefined)mantCam[c]+=n(r.Monto);});
  const compCosts=[{l:'Combustible',v:totComb,c:'#1a3d6e'},{l:'Fijo operación',v:totFijoOp,c:'#2563a8'},{l:'Mantenimiento',v:totMant,c:'#E8521A'},{l:'Costos fijos',v:totFijo,c:'#c0392b'}];

  document.getElementById('tab-cos').innerHTML=`
  <div class="sec-title amber">Composición de costos — ${fmtMes(mes)}</div>
  <div class="mgrid">
    <div class="mc"><div class="mc-label">Combustible</div><div class="mc-val orange">${fmtM(totComb)}</div><div class="mc-sub">${totTotal>0?fmtP(totComb/totTotal):'' } del total</div></div>
    <div class="mc blue"><div class="mc-label">Fijo operación</div><div class="mc-val">${fmtM(totFijoOp)}</div><div class="mc-sub">${totTotal>0?fmtP(totFijoOp/totTotal):'' } del total</div></div>
    <div class="mc"><div class="mc-label">Mantenimiento</div><div class="mc-val orange">${fmtM(totMant)}</div><div class="mc-sub">${totTotal>0?fmtP(totMant/totTotal):'' } del total</div></div>
    <div class="mc blue"><div class="mc-label">Costos fijos</div><div class="mc-val">${fmtM(totFijo)}</div></div>
    <div class="mc green"><div class="mc-label">Costo total</div><div class="mc-val red">${fmtM(totTotal)}</div></div>
  </div>
  <div class="crow">
    <div class="card">
      <div class="card-title">Composición del costo total</div>
      <div style="position:relative;height:220px"><canvas id="cCompos" role="img" aria-label="Composición"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">Peso de cada componente</div>
      ${compCosts.map(e=>`<div class="prow"><span class="plabel">${e.l}</span><div class="pbg"><div class="pfill" style="width:${totTotal>0?(e.v/totTotal*100).toFixed(0):0}%;background:${e.c}"></div></div><span class="pval">${totTotal>0?fmtP(e.v/totTotal):'-'}</span></div>`).join('')}
    </div>
  </div>
  <div class="card" style="margin-bottom:18px">
    <div class="card-title">Detalle costos fijos por concepto</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start">
      <div>${conceptoE.map((e,i)=>`<div class="prow"><span class="plabel">${e[0]}</span><div class="pbg"><div class="pfill" style="width:${totFijo>0?(e[1]/totFijo*100).toFixed(0):0}%;background:${tColors[i]||'#888'}"></div></div><span class="pval">${fmtM(e[1])}</span></div>`).join('')}</div>
      <div style="position:relative;height:220px"><canvas id="cFijosConc" role="img" aria-label="Fijos por concepto"></canvas></div>
    </div>
  </div>
  <div class="crow">
    <div class="card"><div class="card-title">Costos fijos por camión</div><div style="position:relative;height:190px"><canvas id="cFijosCam" role="img" aria-label="Fijos camión"></canvas></div></div>
    <div class="card"><div class="card-title">Costo total por camión</div><div style="position:relative;height:190px"><canvas id="cCostoCam" role="img" aria-label="Costo camión"></canvas></div></div>
  </div>
  <div class="card" style="margin-bottom:18px">
    <div class="card-title">Detalle gastos mantenimiento — ${fmtMes(mes)}</div>
    <div class="twrap"><table>
      <thead><tr><th>Fecha</th><th>Camión</th><th>Chofer</th><th>Tipo</th><th>Monto</th><th>Descripción</th></tr></thead>
      <tbody>${mant.sort((a,b)=>n(b.Monto)-n(a.Monto)).map(r=>`<tr><td>${r.Fecha_str||'-'}</td><td>${r.Patente||'-'}</td><td>${r.Chofer||'-'}</td><td>${r.Tipo||'-'}</td><td>$${fmtN(n(r.Monto))}</td><td>${r.Descripcion||'-'}</td></tr>`).join('')}
      <tr class="tot"><td colspan="4">Total</td><td>$${fmtN(totMant)}</td><td></td></tr></tbody>
    </table></div>
  </div>`;

  dChart('cCompos');charts['cCompos']=new Chart(document.getElementById('cCompos'),{type:'doughnut',data:{labels:compCosts.map(e=>e.l),datasets:[{data:compCosts.map(e=>Math.round(e.v/1000)),backgroundColor:compCosts.map(e=>e.c),borderWidth:2,borderColor:'#fff'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:10},boxWidth:10}}}}});
  dChart('cFijosConc');if(conceptoE.length)charts['cFijosConc']=new Chart(document.getElementById('cFijosConc'),{type:'doughnut',data:{labels:conceptoE.map(e=>e[0]),datasets:[{data:conceptoE.map(e=>Math.round(e[1]/1000)),backgroundColor:tColors,borderWidth:2,borderColor:'#fff'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:10},boxWidth:10}}}}});
  dChart('cFijosCam');charts['cFijosCam']=new Chart(document.getElementById('cFijosCam'),{type:'bar',data:{labels:CAMIONES,datasets:[{label:'Fijos',data:CAMIONES.map(c=>Math.round(fijosCam[c]/1000)),backgroundColor:CAMIONES.map(c=>CCOL[c]),borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false}},y:{ticks:{callback:v=>'$'+v+'K',font:{size:10}},beginAtZero:true}}}});
  dChart('cCostoCam');charts['cCostoCam']=new Chart(document.getElementById('cCostoCam'),{type:'bar',data:{labels:repMes.map(r=>r.Camion),datasets:[{label:'Costo',data:repMes.map(r=>Math.round(n(r.Costo_Total_$)/1000)),backgroundColor:repMes.map(r=>CCOL[r.Camion]||'#888'),borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false}},y:{ticks:{callback:v=>'$'+v+'K',font:{size:10}},beginAtZero:true}}}});
}

// ===== GERENCIAL =====
function renderGer(){
  const mes=getMes();
  const base=DATOS.rep.filter(r=>r.Mes===mes);
  if(!base.length){document.getElementById('tab-ger').innerHTML=`<p style="padding:20px;color:#888">No hay datos para ${fmtMes(mes)}.</p>`;return;}
  const totF=base.reduce((a,r)=>a+n(r.Facturacion_Bruta_$),0);
  const totC=base.reduce((a,r)=>a+n(r.Costo_Total_$),0);
  const totM=base.reduce((a,r)=>a+n(r.Margen_$),0);
  const pct=totF>0?totM/totF:0;
  const totV=base.reduce((a,r)=>a+n(r.Viajes),0);
  const mesesDisp=[...new Set(DATOS.rep.map(r=>r.Mes).filter(m=>m&&m<=mes))].sort().slice(-6);
  const hist=mesesDisp.map(m=>{const rows=DATOS.rep.filter(r=>r.Mes===m);return{mes:m,f:rows.reduce((a,r)=>a+n(r.Facturacion_Bruta_$),0),c:rows.reduce((a,r)=>a+n(r.Costo_Total_$),0),m:rows.reduce((a,r)=>a+n(r.Margen_$),0)};});
  const baseFilt=base.filter(r=>n(r.Facturacion_Bruta_$)>0);

  document.getElementById('tab-ger').innerHTML=`
  <div class="sec-title green">Resumen gerencial — ${fmtMes(mes)}</div>
  <div class="mgrid">
    <div class="mc"><div class="mc-label">Facturación bruta</div><div class="mc-val">${fmtM(totF)}</div></div>
    <div class="mc"><div class="mc-label">Costo total</div><div class="mc-val orange">${fmtM(totC)}</div></div>
    <div class="mc green"><div class="mc-label">Margen</div><div class="mc-val green">${fmtM(totM)}</div><div class="mc-sub">${fmtP(pct)} sobre facturación</div></div>
    <div class="mc blue"><div class="mc-label">Viajes facturados</div><div class="mc-val">${fmtN(totV)}</div></div>
  </div>
  <div class="crow">
    <div class="card">
      <div class="card-title">Facturación vs costo — últimos 6 meses</div>
      <div class="leg"><span><span class="ld" style="background:#1a3d6e"></span>Facturación</span><span><span class="ld" style="background:#E8521A"></span>Costo</span><span><span class="ld" style="background:#16a34a"></span>Margen</span></div>
      <div style="position:relative;height:210px"><canvas id="cHist" role="img" aria-label="Histórico"></canvas></div>
    </div>
    <div class="card"><div class="card-title">% Margen por mes</div><div style="position:relative;height:210px"><canvas id="cPct" role="img" aria-label="% Margen"></canvas></div></div>
  </div>
  <div class="card" style="margin-bottom:18px">
    <div class="card-title">Rentabilidad por camión — ${fmtMes(mes)}</div>
    <div class="twrap"><table>
      <thead><tr><th>Camión</th><th>Facturación</th><th>Costo total</th><th>Margen $</th><th>% Margen</th><th>Costo/km</th><th>Ing/km</th><th>Viajes</th></tr></thead>
      <tbody>${baseFilt.map(r=>{const f=n(r.Facturacion_Bruta_$),c=n(r.Costo_Total_$),m=n(r.Margen_$);const p=f>0?m/f:0;const cls=p>=0.45?'bg':p>=0.3?'ba':'br';return`<tr><td>${r.Camion}</td><td>${fmtM(f)}</td><td>${fmtM(c)}</td><td style="color:${m>0?'#16a34a':'#dc2626'}">${fmtM(m)}</td><td><span class="badge ${cls}">${fmtP(p)}</span></td><td>$${fmtN(n(r['Costo_total/km']))}</td><td>$${fmtN(n(r.Ingreso_km))}</td><td>${r.Viajes||0}</td></tr>`;}).join('')}
      <tr class="tot"><td>Total</td><td>${fmtM(totF)}</td><td>${fmtM(totC)}</td><td>${fmtM(totM)}</td><td>${fmtP(pct)}</td><td>-</td><td>-</td><td>${fmtN(totV)}</td></tr>
      </tbody>
    </table></div>
  </div>
  <div class="crow">
    <div class="card"><div class="card-title">Margen por camión</div><div style="position:relative;height:200px"><canvas id="cMargCam" role="img" aria-label="Margen camión"></canvas></div></div>
    <div class="card"><div class="card-title">Costo/km por camión</div><div style="position:relative;height:200px"><canvas id="cCostKm" role="img" aria-label="Costo km"></canvas></div></div>
  </div>`;

  dChart('cHist');charts['cHist']=new Chart(document.getElementById('cHist'),{type:'bar',data:{labels:hist.map(h=>fmtMes(h.mes).substring(0,3)+' '+h.mes.substring(2,4)),datasets:[{label:'Facturación',data:hist.map(h=>+(h.f/1e6).toFixed(2)),backgroundColor:'#b5d4f4',borderColor:'#1a3d6e',borderWidth:1},{label:'Costo',data:hist.map(h=>+(h.c/1e6).toFixed(2)),backgroundColor:'#ffc5a8',borderColor:'#E8521A',borderWidth:1},{label:'Margen',data:hist.map(h=>+(h.m/1e6).toFixed(2)),backgroundColor:'#9FE1CB',borderColor:'#16a34a',borderWidth:1}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{autoSkip:false,font:{size:10}},grid:{display:false}},y:{ticks:{callback:v=>'$'+v+'M',font:{size:10}}}}}});
  dChart('cPct');charts['cPct']=new Chart(document.getElementById('cPct'),{type:'line',data:{labels:hist.map(h=>fmtMes(h.mes).substring(0,3)+' '+h.mes.substring(2,4)),datasets:[{label:'% Margen',data:hist.map(h=>h.f>0?+(h.m/h.f*100).toFixed(1):0),borderColor:'#E8521A',backgroundColor:'rgba(232,82,26,0.08)',borderWidth:2,pointRadius:4,pointBackgroundColor:'#E8521A',fill:true,tension:0.3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{autoSkip:false,font:{size:10}},grid:{display:false}},y:{ticks:{callback:v=>v+'%',font:{size:10}},min:0,max:70}}}});
  dChart('cMargCam');charts['cMargCam']=new Chart(document.getElementById('cMargCam'),{type:'bar',data:{labels:baseFilt.map(r=>r.Camion),datasets:[{label:'Margen',data:baseFilt.map(r=>+((n(r.Margen_$))/1e6).toFixed(2)),backgroundColor:baseFilt.map(r=>CCOL[r.Camion]||'#888'),borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false}},y:{ticks:{callback:v=>'$'+v+'M',font:{size:10}}}}}});
  dChart('cCostKm');charts['cCostKm']=new Chart(document.getElementById('cCostKm'),{type:'bar',data:{labels:baseFilt.map(r=>r.Camion),datasets:[{label:'$/km',data:baseFilt.map(r=>Math.round(n(r['Costo_total/km']))),backgroundColor:baseFilt.map(r=>CCOL[r.Camion]||'#888'),borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{ticks:{callback:v=>'$'+v.toLocaleString('es-AR'),font:{size:10}}},y:{ticks:{font:{size:11}},grid:{display:false}}}}});
}

initMeses();
renderAll();
</script>
</body>
</html>
