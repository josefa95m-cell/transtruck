<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trans Truck — Panel de Flota</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f4f4f0;color:#222;font-size:14px}
.topbar{background:#1a2e4a;color:#fff;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.topbar-title{font-size:17px;font-weight:700}
.topbar-sub{font-size:11px;opacity:.7;margin-top:2px}
.nav-tabs{display:flex;gap:4px;flex-wrap:wrap}
.nav-tab{padding:7px 14px;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;opacity:.7;background:rgba(255,255,255,.15);color:#fff;transition:all .15s}
.nav-tab.active{opacity:1;background:#fff;color:#1a2e4a}
.syncbar{background:#fff;border-bottom:1px solid #ddd;padding:8px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.sync-btn{padding:6px 14px;background:#1a2e4a;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600}
.sync-btn:hover{background:#2563a8}
.mes-sel{padding:5px 10px;border:1px solid #ccc;border-radius:6px;font-size:12px}
.sync-st{font-size:11px;color:#888}
.section{display:none;padding:16px 20px}
.section.active{display:block}
.sec-title{font-size:15px;font-weight:700;margin-bottom:14px;color:#1a2e4a;border-left:4px solid #2563a8;padding-left:10px}
.sec-title.green{border-color:#16a34a;color:#166534}
.sec-title.amber{border-color:#d97706;color:#92400e}
.mgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:16px}
.mc{background:#fff;border-radius:8px;padding:12px 14px;border:1px solid #e8e8e0}
.mc-label{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
.mc-val{font-size:20px;font-weight:700;color:#1a2e4a}
.mc-val.green{color:#16a34a}
.mc-val.amber{color:#b45309}
.mc-val.red{color:#dc2626}
.mc-sub{font-size:10px;color:#aaa;margin-top:2px}
.crow{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.card{background:#fff;border-radius:8px;padding:14px;border:1px solid #e8e8e0}
.card-title{font-size:11px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px}
.twrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:11px}
th{text-align:right;padding:6px 8px;background:#f8f8f4;color:#555;font-weight:700;font-size:10px;border-bottom:1px solid #e0e0d8;white-space:nowrap}
th:first-child{text-align:left}
td{text-align:right;padding:6px 8px;border-bottom:1px solid #f0f0e8;color:#333;white-space:nowrap}
td:first-child{text-align:left;font-weight:600;color:#1a2e4a}
tr.tot td{background:#f8f8f4;font-weight:700;border-top:1px solid #ddd}
.badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700}
.bg{background:#dcfce7;color:#166534}
.ba{background:#fef3c7;color:#92400e}
.br{background:#fee2e2;color:#991b1b}
.prow{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.plabel{width:130px;font-size:11px;color:#555;flex-shrink:0}
.pbg{flex:1;height:8px;background:#f0f0e8;border-radius:4px;overflow:hidden}
.pfill{height:100%;border-radius:4px}
.pval{width:55px;text-align:right;font-size:11px;font-weight:700;color:#333}
.leg{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px;font-size:10px;color:#666}
.leg span{display:flex;align-items:center;gap:3px}
.ld{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.loading{text-align:center;padding:30px;color:#888;font-size:13px}
.errmsg{background:#fee2e2;color:#991b1b;padding:10px 14px;border-radius:7px;font-size:12px;margin:10px 0}
@media(max-width:600px){.crow{grid-template-columns:1fr}.nav-tab{font-size:11px;padding:6px 10px}}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <div class="topbar-title">Trans Truck — Panel de Flota</div>
    <div class="topbar-sub" id="tfecha">Cargando...</div>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="setTab('op')">Operativo</button>
    <button class="nav-tab" onclick="setTab('cos')">Costos</button>
    <button class="nav-tab" onclick="setTab('ger')">Gerencial</button>
  </div>
</div>

<div class="syncbar">
  <button class="sync-btn" onclick="cargarTodo()">Actualizar datos</button>
  <select class="mes-sel" id="mesSelect" onchange="renderAll()"><option>Cargando...</option></select>
  <span class="sync-st" id="syncSt">Conectando...</span>
</div>

<div id="tab-op" class="section active"><div class="loading">Cargando datos operativos...</div></div>
<div id="tab-cos" class="section"><div class="loading">Cargando costos...</div></div>
<div id="tab-ger" class="section"><div class="loading">Cargando datos gerenciales...</div></div>

<script>
const CSV = {
  reportes:    'https://docs.google.com/spreadsheets/d/e/2PACX-1vTdQY1Q10NBQxfPh1w2hQiIycQ8VS6wPkNrA84I6BqAwS05PXhv0YghfMhPanoGZg/pub?gid=842673272&single=true&output=csv',
  movimientos: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTg-TirU69Fo2OC15uTntENBItePoNJidPNAm4evwe55CyHPPdNEBSeBqv0f-Fe5w/pub?gid=408513105&single=true&output=csv',
  combustible: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT9DYRCIqMGGEFAFfrrco-Ksha8qpIHq-u00Q-re3nJJGhcTYHmmIecPHmfA4nUgQ/pub?gid=1081696211&single=true&output=csv',
  costosFijos: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT9DYRCIqMGGEFAFfrrco-Ksha8qpIHq-u00Q-re3nJJGhcTYHmmIecPHmfA4nUgQ/pub?gid=209165186&single=true&output=csv',
  mantenimiento:'https://docs.google.com/spreadsheets/d/e/2PACX-1vRJeUbLKVLpeJ31U3_5sxZob0hFxfSn-TL_CGZIgevbqS4heu16v2RF_kVGWMUAKA/pub?gid=826021015&single=true&output=csv'
};

let D={rep:[],mov:[],comb:[],fijos:[],mant:[]};
let meses=[],charts={};
const CCOL={'AE817YC':'#185FA5','AE817YN':'#1D9E75','AG726GZ':'#D85A30','OAN502':'#854F0B','AG213SH':'#5F5E5A'};
const CAMIONES=['AE817YC','AE817YN','AG726GZ','OAN502'];

const MESES_ESP={
  'enero':'2025-01','febrero':'2025-02','marzo':'2025-03','abril':'2025-04',
  'mayo':'2025-05','junio':'2025-06','julio':'2025-07','agosto':'2025-08',
  'septiembre':'2025-09','octubre':'2025-10','noviembre':'2025-11','diciembre':'2025-12'
};

function setSt(m){document.getElementById('syncSt').textContent=m}

function parseCSVLine(line){
  const res=[];let cur='';let inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){inQ=!inQ}
    else if(c===','&&!inQ){res.push(cur);cur=''}
    else cur+=c;
  }
  res.push(cur);
  return res;
}

async function fetchCSV(url){
  const r=await fetch(url+'&t='+Date.now());
  if(!r.ok) throw new Error(r.status);
  const txt=await r.text();
  const lines=txt.trim().split('\n');
  const headers=parseCSVLine(lines[0]);
  return lines.slice(1).filter(l=>l.trim()).map(l=>{
    const vals=parseCSVLine(l);
    const obj={};
    headers.forEach((h,i)=>obj[h.trim()]=(vals[i]||'').trim());
    return obj;
  });
}

// Convierte fecha d/m/yyyy o yyyy-mm-dd a "yyyy-mm"
function fechaAMes(f){
  if(!f) return '';
  f=String(f).trim();
  // formato yyyy-mm-dd o yyyy-mm
  if(f.match(/^\d{4}-\d{2}/)) return f.substring(0,7);
  // formato d/m/yyyy o dd/mm/yyyy
  const p=f.split('/');
  if(p.length===3){
    const y=p[2].length===4?p[2]:'20'+p[2];
    const m=p[1].padStart(2,'0');
    return y+'-'+m;
  }
  return '';
}

// Convierte texto de mes en español a yyyy-mm
function mesEspANum(m){
  if(!m) return '';
  m=String(m).trim().toLowerCase();
  // ya es yyyy-mm
  if(m.match(/^\d{4}-\d{2}/)) return m.substring(0,7);
  // buscar en mapa — detectar año del contexto
  for(const [nombre,val] of Object.entries(MESES_ESP)){
    if(m.includes(nombre)){
      // intentar detectar año si viene en el string
      const yMatch=m.match(/\d{4}/);
      if(yMatch) return yMatch[0]+'-'+val.substring(5);
      return val;
    }
  }
  return '';
}

// Función unificada: intenta todos los formatos
function toMes(v){
  if(!v) return '';
  const s=String(v).trim();
  // yyyy-mm o yyyy-mm-dd
  if(s.match(/^\d{4}-\d{2}/)) return s.substring(0,7);
  // d/m/yyyy
  if(s.match(/^\d{1,2}\/\d{1,2}\/\d{4}/)) return fechaAMes(s);
  // número puro (mes como 9 = septiembre) — necesita año
  if(s.match(/^\d{1,2}$/)){ return ''; }
  // texto español
  return mesEspANum(s);
}

function fmtMes(m){
  if(!m) return '';
  const [y,mo]=m.split('-');
  const ns=['','Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  return `${ns[parseInt(mo)]} ${y}`;
}

function fmtM(v){return '$'+(v/1000000).toFixed(1)+'M'}
function fmtN(v){return Math.round(v).toLocaleString('es-AR')}
function fmtP(v){return(v*100).toFixed(1)+'%'}
function n(v){return parseFloat(String(v).replace(',','.'))||0}
function getMes(){return document.getElementById('mesSelect').value}
function dChart(id){if(charts[id]){charts[id].destroy();delete charts[id];}}

function setTab(t){
  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelector(`[onclick="setTab('${t}')"]`).classList.add('active');
  document.getElementById('tab-'+t).classList.add('active');
}

async function cargarTodo(){
  setSt('Conectando con Google Sheets...');
  try{
    setSt('Cargando reportes...');    D.rep=await fetchCSV(CSV.reportes);
    setSt('Cargando movimientos...'); D.mov=await fetchCSV(CSV.movimientos);
    setSt('Cargando combustible...'); D.comb=await fetchCSV(CSV.combustible);
    setSt('Cargando costos fijos...'); D.fijos=await fetchCSV(CSV.costosFijos);
    setSt('Cargando mantenimiento...'); D.mant=await fetchCSV(CSV.mantenimiento);
    procesarMeses();
    renderAll();
    const now=new Date();
    setSt(`Actualizado: ${now.toLocaleDateString('es-AR')} ${now.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'})}`);
    document.getElementById('tfecha').textContent=`Datos al ${now.toLocaleDateString('es-AR',{day:'2-digit',month:'long',year:'numeric'})}`;
  }catch(e){
    setSt('Error al cargar. Verificá los permisos de Google Sheets.');
    console.error(e);
  }
}

function procesarMeses(){
  const set=new Set();
  // De reportes: columna Mes viene como yyyy-mm-dd o yyyy-mm
  D.rep.forEach(r=>{const m=toMes(r.Mes);if(m&&m.match(/^\d{4}-\d{2}$/))set.add(m);});
  // De movimientos: columna Mes viene en español "Septiembre"
  D.mov.forEach(r=>{
    let m=toMes(r.Mes);
    if(!m) m=toMes(r['Fecha ']||r.Fecha);
    if(m&&m.match(/^\d{4}-\d{2}$/))set.add(m);
  });
  // De combustible: columna Mes es número (9) + fecha d/m/yyyy
  D.comb.forEach(r=>{
    const m=toMes(r.Fecha);
    if(m&&m.match(/^\d{4}-\d{2}$/))set.add(m);
  });
  meses=[...set].sort();
  const sel=document.getElementById('mesSelect');
  sel.innerHTML=meses.map(m=>`<option value="${m}">${fmtMes(m)}</option>`).join('');
  if(meses.length) sel.value=meses[meses.length-1];
}

function renderAll(){renderOp();renderCos();renderGer();}

function renderOp(){
  const mes=getMes();

  // Movimientos: mes en español o por fecha
  const mov=D.mov.filter(r=>{
    const porMes=toMes(r.Mes);
    const porFecha=toMes(r['Fecha ']||r.Fecha);
    return porMes===mes||porFecha===mes;
  });

  // Combustible: por fecha d/m/yyyy
  const comb=D.comb.filter(r=>toMes(r.Fecha)===mes);

  const st={};
  CAMIONES.forEach(c=>st[c]={viajes:0,kg:0,km:0,litros:0,lt100s:[],chofer:''});

  mov.forEach(r=>{
    const cam=String(r.Camion||'').trim();
    if(!st[cam])return;
    st[cam].viajes++;
    // kg: viene con punto como separador decimal en lugar de coma: "140.280" = 140280 kg
    const rawKg=String(r['Neto ']||r.Neto||'0').replace(',','.');
    const kg=parseFloat(rawKg)||0;
    // Si el valor tiene punto como separador de miles (140.280 = 140280)
    const kgReal=kg<1000?kg*1000:kg;
    st[cam].kg+=kgReal;
    st[cam].km+=n(r['Km asfalto']||0);
    if(r.Chofer&&!st[cam].chofer) st[cam].chofer=String(r.Chofer).trim().split(' ')[0];
  });

  comb.forEach(r=>{
    const cam=String(r.Camion||'').trim();
    if(!st[cam])return;
    st[cam].litros+=n(r.LT||0);
    const l=n(r['Lt/100']||0);
    if(l>0&&l<200) st[cam].lt100s.push(l);
  });

  const totV=CAMIONES.reduce((a,c)=>a+st[c].viajes,0);
  const totKg=CAMIONES.reduce((a,c)=>a+st[c].kg,0);
  const totLt=CAMIONES.reduce((a,c)=>a+st[c].litros,0);
  const totKm=CAMIONES.reduce((a,c)=>a+st[c].km,0);

  const mercMap={};
  mov.forEach(r=>{
    const merc=String(r.Mercaderia||'Sin datos').trim();
    if(!mercMap[merc])mercMap[merc]=0;
    const rawKg=String(r['Neto ']||r.Neto||'0').replace(',','.');
    const kg=parseFloat(rawKg)||0;
    mercMap[merc]+=kg<1000?kg*1000:kg;
  });
  const mercs=Object.entries(mercMap).sort((a,b)=>b[1]-a[1]);
  const mColors=['#185FA5','#1D9E75','#D85A30','#854F0B','#7F77DD','#888780'];
  const mercTot=mercs.reduce((a,e)=>a+e[1],0);

  document.getElementById('tab-op').innerHTML=`
  <div class="sec-title">Movimiento operativo — ${fmtMes(mes)}</div>
  <div class="mgrid">
    <div class="mc"><div class="mc-label">Viajes del mes</div><div class="mc-val">${totV}</div></div>
    <div class="mc"><div class="mc-label">Tn transportadas</div><div class="mc-val">${(totKg/1000).toFixed(0)}</div><div class="mc-sub">toneladas</div></div>
    <div class="mc"><div class="mc-label">Km facturados</div><div class="mc-val">${fmtN(totKm)}</div></div>
    <div class="mc"><div class="mc-label">Litros cargados</div><div class="mc-val">${fmtN(totLt)}</div></div>
    <div class="mc"><div class="mc-label">Camiones activos</div><div class="mc-val">${CAMIONES.filter(c=>st[c].viajes>0).length}</div></div>
  </div>
  <div class="crow">
    <div class="card">
      <div class="card-title">Viajes por camión</div>
      <div class="leg">${CAMIONES.map(c=>`<span><span class="ld" style="background:${CCOL[c]}"></span>${c}</span>`).join('')}</div>
      <div style="position:relative;height:200px"><canvas id="cViajes" role="img" aria-label="Viajes por camión"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">Consumo Lt/100km</div>
      <div style="position:relative;height:200px"><canvas id="cConsumo" role="img" aria-label="Consumo por camión"></canvas></div>
    </div>
  </div>
  <div class="card" style="margin-bottom:16px">
    <div class="card-title">Detalle por camión — ${fmtMes(mes)}</div>
    <div class="twrap"><table>
      <thead><tr><th>Camión</th><th>Chofer</th><th>Viajes</th><th>Tn</th><th>Km</th><th>Litros</th><th>Lt/100km</th></tr></thead>
      <tbody>
      ${CAMIONES.map(c=>{
        const s=st[c];
        const lt=s.lt100s.length?(s.lt100s.reduce((a,b)=>a+b,0)/s.lt100s.length).toFixed(1):'-';
        return `<tr><td>${c}</td><td>${s.chofer||'-'}</td><td>${s.viajes}</td><td>${(s.kg/1000).toFixed(1)}</td><td>${fmtN(s.km)}</td><td>${fmtN(s.litros)}</td><td>${lt}</td></tr>`;
      }).join('')}
      <tr class="tot"><td>Total</td><td>-</td><td>${totV}</td><td>${(totKg/1000).toFixed(1)}</td><td>${fmtN(totKm)}</td><td>${fmtN(totLt)}</td><td>-</td></tr>
      </tbody>
    </table></div>
  </div>
  <div class="crow">
    <div class="card">
      <div class="card-title">Mercaderías transportadas</div>
      <div style="position:relative;height:220px"><canvas id="cMerc" role="img" aria-label="Mercaderías"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">Distribución por Tn</div>
      ${mercs.map((e,i)=>`
        <div class="prow">
          <span class="plabel">${e[0]}</span>
          <div class="pbg"><div class="pfill" style="width:${mercTot>0?(e[1]/mercTot*100).toFixed(0):0}%;background:${mColors[i]||'#888'}"></div></div>
          <span class="pval">${(e[1]/1000).toFixed(0)}Tn</span>
        </div>`).join('')}
    </div>
  </div>`;

  dChart('cViajes');
  charts['cViajes']=new Chart(document.getElementById('cViajes'),{
    type:'bar',
    data:{labels:CAMIONES,datasets:[{label:'Viajes',data:CAMIONES.map(c=>st[c].viajes),backgroundColor:CAMIONES.map(c=>CCOL[c]),borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false}},y:{ticks:{font:{size:10}}}}}
  });

  dChart('cConsumo');
  charts['cConsumo']=new Chart(document.getElementById('cConsumo'),{
    type:'bar',
    data:{labels:CAMIONES,datasets:[{label:'Lt/100km',data:CAMIONES.map(c=>{const s=st[c];return s.lt100s.length?+(s.lt100s.reduce((a,b)=>a+b,0)/s.lt100s.length).toFixed(1):0;}),backgroundColor:CAMIONES.map(c=>CCOL[c]),borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:10}}},y:{ticks:{font:{size:11}},grid:{display:false}}}}
  });

  dChart('cMerc');
  charts['cMerc']=new Chart(document.getElementById('cMerc'),{
    type:'doughnut',
    data:{labels:mercs.map(e=>e[0]),datasets:[{data:mercs.map(e=>+(e[1]/1000).toFixed(1)),backgroundColor:mColors,borderWidth:2,borderColor:'#fff'}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:10},boxWidth:10}}}}
  });
}

function renderCos(){
  const mes=getMes();
  const fijos=D.fijos.filter(r=>{
    const m=toMes(r.Periodo);
    return m===mes&&String(r.EnUso||'').toLowerCase()==='si';
  });
  const mant=D.mant.filter(r=>toMes(r.Mes)===mes||toMes(r.Fecha)===mes);

  const totFijo=fijos.reduce((a,r)=>a+n(r.Importe),0);
  const mantPorTipo={};
  mant.forEach(r=>{
    const t=String(r.Tipo||'Otros').trim();
    if(!mantPorTipo[t])mantPorTipo[t]=0;
    mantPorTipo[t]+=n(r.Monto);
  });
  const totMant=Object.values(mantPorTipo).reduce((a,b)=>a+b,0);
  const tipoEntries=Object.entries(mantPorTipo).sort((a,b)=>b[1]-a[1]);
  const tColors=['#D85A30','#185FA5','#1D9E75','#854F0B','#7F77DD','#888780'];
  const totTipo=tipoEntries.reduce((a,e)=>a+e[1],0);

  const fijosPorCam={};CAMIONES.forEach(c=>fijosPorCam[c]=0);
  fijos.forEach(r=>{const cam=String(r.Patente||'').trim();if(fijosPorCam[cam]!==undefined)fijosPorCam[cam]+=n(r.Importe);});
  const mantPorCam={};CAMIONES.forEach(c=>mantPorCam[c]=0);
  mant.forEach(r=>{const cam=String(r.Patente||'').trim();if(mantPorCam[cam]!==undefined)mantPorCam[cam]+=n(r.Monto);});

  document.getElementById('tab-cos').innerHTML=`
  <div class="sec-title amber">Composición de costos — ${fmtMes(mes)}</div>
  <div class="mgrid">
    <div class="mc"><div class="mc-label">Costos fijos</div><div class="mc-val amber">${fmtM(totFijo)}</div></div>
    <div class="mc"><div class="mc-label">Mantenimiento</div><div class="mc-val amber">${fmtM(totMant)}</div></div>
    <div class="mc"><div class="mc-label">Total costos</div><div class="mc-val red">${fmtM(totFijo+totMant)}</div></div>
    <div class="mc"><div class="mc-label">% Mant s/total</div><div class="mc-val">${totFijo+totMant>0?fmtP(totMant/(totFijo+totMant)):'-'}</div></div>
  </div>
  <div class="crow">
    <div class="card">
      <div class="card-title">Tipo de gasto — mantenimiento</div>
      <div style="position:relative;height:220px"><canvas id="cTipos" role="img" aria-label="Tipos de gasto"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">Peso por tipo de gasto</div>
      ${tipoEntries.map((e,i)=>`
        <div class="prow">
          <span class="plabel">${e[0]}</span>
          <div class="pbg"><div class="pfill" style="width:${totTipo>0?(e[1]/totTipo*100).toFixed(0):0}%;background:${tColors[i]||'#888'}"></div></div>
          <span class="pval">${fmtM(e[1])}</span>
        </div>`).join('')}
    </div>
  </div>
  <div class="crow">
    <div class="card">
      <div class="card-title">Costos fijos por camión</div>
      <div style="position:relative;height:190px"><canvas id="cFijos" role="img" aria-label="Costos fijos por camión"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">Mantenimiento por camión</div>
      <div style="position:relative;height:190px"><canvas id="cMantCam" role="img" aria-label="Mantenimiento por camión"></canvas></div>
    </div>
  </div>
  <div class="card" style="margin-bottom:16px">
    <div class="card-title">Detalle gastos de mantenimiento — ${fmtMes(mes)}</div>
    <div class="twrap"><table>
      <thead><tr><th>Fecha</th><th>Camión</th><th>Chofer</th><th>Tipo</th><th>Monto</th><th>Descripción</th></tr></thead>
      <tbody>
      ${mant.sort((a,b)=>n(b.Monto)-n(a.Monto)).map(r=>`
        <tr><td>${String(r.Fecha||'').substring(0,10)}</td><td>${r.Patente||'-'}</td><td>${r.Chofer||'-'}</td><td>${r.Tipo||'-'}</td><td>$${fmtN(n(r.Monto))}</td><td>${r.Descripcion||'-'}</td></tr>
      `).join('')}
      <tr class="tot"><td colspan="4">Total</td><td>$${fmtN(totMant)}</td><td></td></tr>
      </tbody>
    </table></div>
  </div>`;

  dChart('cTipos');
  charts['cTipos']=new Chart(document.getElementById('cTipos'),{
    type:'doughnut',
    data:{labels:tipoEntries.map(e=>e[0]),datasets:[{data:tipoEntries.map(e=>Math.round(e[1]/1000)),backgroundColor:tColors,borderWidth:2,borderColor:'#fff'}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:10},boxWidth:10}}}}
  });
  dChart('cFijos');
  charts['cFijos']=new Chart(document.getElementById('cFijos'),{
    type:'bar',
    data:{labels:CAMIONES,datasets:[{label:'Fijos',data:CAMIONES.map(c=>Math.round(fijosPorCam[c]/1000)),backgroundColor:CAMIONES.map(c=>CCOL[c]),borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false}},y:{ticks:{callback:v=>'$'+v+'K',font:{size:10}}}}}
  });
  dChart('cMantCam');
  charts['cMantCam']=new Chart(document.getElementById('cMantCam'),{
    type:'bar',
    data:{labels:CAMIONES,datasets:[{label:'Mant',data:CAMIONES.map(c=>Math.round(mantPorCam[c]/1000)),backgroundColor:CAMIONES.map(c=>CCOL[c]),borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false}},y:{ticks:{callback:v=>'$'+v+'K',font:{size:10}}}}}
  });
}

function renderGer(){
  const mes=getMes();
  const base=D.rep.filter(r=>toMes(r.Mes)===mes);
  if(!base.length){
    document.getElementById('tab-ger').innerHTML=`<div class="errmsg">No hay datos de reportes para ${fmtMes(mes)}.</div>`;
    return;
  }
  const totF=base.reduce((a,r)=>a+n(r.Facturacion_Bruta_$),0);
  const totC=base.reduce((a,r)=>a+n(r.Costo_Total_$),0);
  const totM=base.reduce((a,r)=>a+n(r.Margen_$),0);
  const pct=totF>0?totM/totF:0;
  const totV=base.reduce((a,r)=>a+n(r.Viajes),0);

  const hist=[];
  meses.filter(m=>m<=mes).slice(-6).forEach(m=>{
    const rows=D.rep.filter(r=>toMes(r.Mes)===m);
    if(rows.length) hist.push({mes:m,f:rows.reduce((a,r)=>a+n(r.Facturacion_Bruta_$),0),c:rows.reduce((a,r)=>a+n(r.Costo_Total_$),0),m:rows.reduce((a,r)=>a+n(r.Margen_$),0)});
  });

  const baseFilt=base.filter(r=>n(r.Facturacion_Bruta_$)>0);

  document.getElementById('tab-ger').innerHTML=`
  <div class="sec-title green">Resumen gerencial — ${fmtMes(mes)}</div>
  <div class="mgrid">
    <div class="mc"><div class="mc-label">Facturación bruta</div><div class="mc-val">${fmtM(totF)}</div></div>
    <div class="mc"><div class="mc-label">Costo total</div><div class="mc-val amber">${fmtM(totC)}</div></div>
    <div class="mc"><div class="mc-label">Margen</div><div class="mc-val green">${fmtM(totM)}</div><div class="mc-sub">${fmtP(pct)} del total</div></div>
    <div class="mc"><div class="mc-label">Viajes facturados</div><div class="mc-val">${fmtN(totV)}</div></div>
  </div>
  <div class="crow">
    <div class="card">
      <div class="card-title">Facturación vs costo — últimos 6 meses</div>
      <div class="leg">
        <span><span class="ld" style="background:#185FA5"></span>Facturación</span>
        <span><span class="ld" style="background:#D85A30"></span>Costo</span>
        <span><span class="ld" style="background:#1D9E75"></span>Margen</span>
      </div>
      <div style="position:relative;height:210px"><canvas id="cHist" role="img" aria-label="Histórico"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">% Margen por mes</div>
      <div style="position:relative;height:210px"><canvas id="cPct" role="img" aria-label="Porcentaje margen"></canvas></div>
    </div>
  </div>
  <div class="card" style="margin-bottom:16px">
    <div class="card-title">Rentabilidad por camión — ${fmtMes(mes)}</div>
    <div class="twrap"><table>
      <thead><tr><th>Camión</th><th>Facturación</th><th>Costo</th><th>Margen $</th><th>% Margen</th><th>Costo/km</th><th>Ing/km</th><th>Viajes</th></tr></thead>
      <tbody>
      ${baseFilt.map(r=>{
        const f=n(r.Facturacion_Bruta_$),c=n(r.Costo_Total_$),m=n(r.Margen_$);
        const p=f>0?m/f:0;
        const cls=p>=0.45?'bg':p>=0.3?'ba':'br';
        return `<tr><td>${r.Camion}</td><td>${fmtM(f)}</td><td>${fmtM(c)}</td><td style="color:${m>0?'#16a34a':'#dc2626'}">${fmtM(m)}</td><td><span class="badge ${cls}">${fmtP(p)}</span></td><td>$${fmtN(n(r['Costo_total/km']))}</td><td>$${fmtN(n(r.Ingreso_km))}</td><td>${r.Viajes||0}</td></tr>`;
      }).join('')}
      <tr class="tot"><td>Total</td><td>${fmtM(totF)}</td><td>${fmtM(totC)}</td><td>${fmtM(totM)}</td><td>${fmtP(pct)}</td><td>-</td><td>-</td><td>${fmtN(totV)}</td></tr>
      </tbody>
    </table></div>
  </div>
  <div class="crow">
    <div class="card">
      <div class="card-title">Margen por camión</div>
      <div style="position:relative;height:190px"><canvas id="cMargCam" role="img" aria-label="Margen por camión"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">Costo/km por camión</div>
      <div style="position:relative;height:190px"><canvas id="cCostKm" role="img" aria-label="Costo km"></canvas></div>
    </div>
  </div>`;

  dChart('cHist');
  charts['cHist']=new Chart(document.getElementById('cHist'),{
    type:'bar',
    data:{labels:hist.map(h=>fmtMes(h.mes).substring(0,3)+' '+h.mes.substring(2,4)),datasets:[
      {label:'Facturación',data:hist.map(h=>+(h.f/1e6).toFixed(2)),backgroundColor:'#B5D4F4',borderColor:'#185FA5',borderWidth:1},
      {label:'Costo',data:hist.map(h=>+(h.c/1e6).toFixed(2)),backgroundColor:'#F5C4B3',borderColor:'#D85A30',borderWidth:1},
      {label:'Margen',data:hist.map(h=>+(h.m/1e6).toFixed(2)),backgroundColor:'#9FE1CB',borderColor:'#1D9E75',borderWidth:1},
    ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{autoSkip:false,font:{size:10}},grid:{display:false}},y:{ticks:{callback:v=>'$'+v+'M',font:{size:10}}}}}
  });
  dChart('cPct');
  charts['cPct']=new Chart(document.getElementById('cPct'),{
    type:'line',
    data:{labels:hist.map(h=>fmtMes(h.mes).substring(0,3)+' '+h.mes.substring(2,4)),datasets:[{label:'% Margen',data:hist.map(h=>h.f>0?+(h.m/h.f*100).toFixed(1):0),borderColor:'#1D9E75',backgroundColor:'rgba(29,158,117,0.08)',borderWidth:2,pointRadius:4,pointBackgroundColor:'#1D9E75',fill:true,tension:0.3}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{autoSkip:false,font:{size:10}},grid:{display:false}},y:{ticks:{callback:v=>v+'%',font:{size:10}},min:0,max:70}}}
  });
  dChart('cMargCam');
  charts['cMargCam']=new Chart(document.getElementById('cMargCam'),{
    type:'bar',
    data:{labels:baseFilt.map(r=>r.Camion),datasets:[{label:'Margen',data:baseFilt.map(r=>+((n(r.Margen_$))/1e6).toFixed(2)),backgroundColor:baseFilt.map(r=>CCOL[r.Camion]||'#888'),borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false}},y:{ticks:{callback:v=>'$'+v+'M',font:{size:10}}}}}
  });
  dChart('cCostKm');
  charts['cCostKm']=new Chart(document.getElementById('cCostKm'),{
    type:'bar',
    data:{labels:baseFilt.map(r=>r.Camion),datasets:[{label:'$/km',data:baseFilt.map(r=>Math.round(n(r['Costo_total/km']))),backgroundColor:baseFilt.map(r=>CCOL[r.Camion]||'#888'),borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{ticks:{callback:v=>'$'+v.toLocaleString('es-AR'),font:{size:10}}},y:{ticks:{font:{size:11}},grid:{display:false}}}}
  });
}

cargarTodo();
</script>
</body>
</html>
